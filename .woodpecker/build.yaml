steps:
  - name: build
    image: gcr.io/kaniko-project/executor:debug
    commands:
      - /kaniko/executor --context=dir:///woodpecker/src --dockerfile=Dockerfile --no-push --tar-path=/dev/null
  # Uncomment when local registry is available
  # - name: build-and-push
  #   image: gcr.io/kaniko-project/executor:debug
  #   commands:
  #     - /kaniko/executor --context=dir:///woodpecker/src --dockerfile=Dockerfile --destination=registry.home/jukevox:${CI_COMMIT_SHA:0:8} --destination=registry.home/jukevox:latest

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
