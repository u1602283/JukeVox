steps:
  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: Dockerfile
      dry-run: true
      output: type=oci,dest=jukevox.tar

  - name: scan
    image: anchore/grype:latest
    commands:
      - ls -la ${CI_WORKSPACE}/ || true
      - find / -name "jukevox.tar" 2>/dev/null || true
      - echo "workspace is ${CI_WORKSPACE}"

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
