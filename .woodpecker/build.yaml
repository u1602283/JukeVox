steps:
  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: Dockerfile
      dry_run: true
      output: type=docker,dest=${CI_WORKSPACE}/jukevox.tar

  - name: scan
    image: anchore/grype:latest
    commands:
      - grype ${CI_WORKSPACE}/jukevox.tar --fail-on critical

  # Uncomment when local registry is available
  # - name: push
  #   image: woodpeckerci/plugin-docker-buildx
  #   settings:
  #     dockerfile: Dockerfile
  #     registry: registry.home
  #     repo: registry.home/jukevox
  #     tags:
  #       - ${CI_COMMIT_SHA:0:8}
  #       - latest

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
