steps:
  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: Dockerfile
      dry_run: true
      output: type=docker,dest=/tmp/jukevox.tar
      # Uncomment when local registry is available
      # dry_run: false
      # registry: registry.home
      # repo: registry.home/jukevox
      # tags:
      #   - ${CI_COMMIT_SHA:0:8}
      #   - latest

  - name: scan
    image: anchore/grype:latest
    commands:
      - grype /tmp/jukevox.tar --fail-on critical

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
