steps:
  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: Dockerfile
      dry-run: true
      output: type=oci,dest=jukevox.tar

  - name: scan
    image: alpine:3
    commands:
      - apk add --no-cache curl
      - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - ls -la jukevox.tar || echo "tar not found"
      - grype oci-archive:jukevox.tar --fail-on critical

  # Uncomment when local registry is available
  # - name: push
  #   image: woodpeckerci/plugin-docker-buildx
  #   settings:
  #     dockerfile: Dockerfile
  #     registry: registry.home
  #     repo: registry.home/jukevox
  #     tags:
  #       - ${CI_COMMIT_SHA:0:8}
  #       - latest

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
