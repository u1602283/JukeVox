steps:
  - name: build-and-push
    image: ghcr.io/404systems/plugin-buildah:v1.1.0
    environment:
      BUILDAH_ISOLATION: chroot
      STORAGE_DRIVER: vfs
    settings:
      containerfile: Dockerfile
      repo: jukevox
      registry: REDACTED_REGISTRY
      tags: "${CI_COMMIT_SHA:0:8},latest"

  - name: scan
    image: alpine:3
    commands:
      - apk add --no-cache curl
      - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - grype registry:REDACTED_REGISTRY/jukevox:${CI_COMMIT_SHA:0:8} --fail-on critical

  - name: cleanup-vulnerable-image
    image: alpine:3
    commands:
      - apk add --no-cache curl jq
      - "TAG=${CI_COMMIT_SHA:0:8}"
      - "REGISTRY=http://REDACTED_REGISTRY"
      - "REPO=jukevox"
      - 'DIGEST=$(curl -sf -H "Accept: application/vnd.docker.distribution.manifest.v2+json" "$REGISTRY/v2/$REPO/manifests/$TAG" -o /dev/null -D - | grep -i docker-content-digest | tr -d "\r" | awk "{print \$2}")'
      - 'echo "Deleting $REPO:$TAG (digest: $DIGEST)"'
      - 'curl -sf -X DELETE "$REGISTRY/v2/$REPO/manifests/$DIGEST"'
      - 'echo "Deleted vulnerable image"'
    when:
      - status: failure

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
