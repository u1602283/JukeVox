steps:
  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: Dockerfile
      dry-run: true
      output: type=oci,dest=jukevox.tar

  - name: scan
    image: alpine:3
    commands:
      - apk add --no-cache curl
      - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - grype oci-archive:jukevox.tar --fail-on critical

  - name: push
    image: woodpeckerci/plugin-docker-buildx:6-insecure
    commands:
      - mkdir -p /etc/buildkit
      - |
        cat > /etc/buildkit/buildkitd.toml << 'TOML'
        [registry."REDACTED_REGISTRY"]
          http = true
          insecure = true
        TOML
      - dockerd --data-root /var/lib/docker --host=unix:///var/run/docker.sock &
      - sleep 3
      - docker buildx create --name pusher --use --buildkitd-config /etc/buildkit/buildkitd.toml
      - docker buildx build --rm=true -f Dockerfile . --pull=true --output type=image,push=true -t REDACTED_REGISTRY/jukevox:${CI_COMMIT_SHA:0:8} -t REDACTED_REGISTRY/jukevox:latest

  - name: cleanup-vulnerable-image
    image: alpine:3
    commands:
      - apk add --no-cache curl jq
      - "TAG=${CI_COMMIT_SHA:0:8}"
      - "REGISTRY=http://REDACTED_REGISTRY"
      - "REPO=jukevox"
      - 'DIGEST=$(curl -sf -H "Accept: application/vnd.docker.distribution.manifest.v2+json" "$REGISTRY/v2/$REPO/manifests/$TAG" -o /dev/null -D - | grep -i docker-content-digest | tr -d "\r" | awk "{print \$2}")'
      - 'echo "Deleting $REPO:$TAG (digest: $DIGEST)"'
      - 'curl -sf -X DELETE "$REGISTRY/v2/$REPO/manifests/$DIGEST"'
      - 'echo "Deleted vulnerable image"'
    when:
      - status: failure

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
