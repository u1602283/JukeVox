clone:
  - name: clone
    image: woodpeckerci/plugin-git
    settings:
      partial: false
      depth: 0

steps:
  - name: version
    image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    commands:
      - dotnet tool install -g nbgv
      - export PATH="$PATH:$HOME/.dotnet/tools"
      - VERSION=$(nbgv get-version -v NuGetPackageVersion)
      - echo "$VERSION" > .version
      - echo "Version:$VERSION"

  - name: test
    image: mcr.microsoft.com/dotnet/sdk:10.0-alpine
    commands:
      - dotnet test JukeVox.slnx

  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: Dockerfile
      dry-run: true
      output: type=docker,dest=jukevox.tar

  - name: scan
    image: alpine:3
    commands:
      - apk add --no-cache curl
      - curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - grype oci-archive:jukevox.tar --fail-on critical

  - name: push
    image: alpine:3
    commands:
      - apk add --no-cache curl
      - curl -sL https://github.com/google/go-containerregistry/releases/latest/download/go-containerregistry_Linux_x86_64.tar.gz | tar xz -C /usr/local/bin crane
      - VERSION=$(cat .version)
      - crane push jukevox.tar distribution.registry.svc.cluster.local:5000/jukevox:$VERSION --insecure
      - crane tag distribution.registry.svc.cluster.local:5000/jukevox:$VERSION latest --insecure

  - name: prune-old-images
    image: alpine:3
    commands:
      - apk add --no-cache curl jq
      - "REGISTRY=http://distribution.registry.svc.cluster.local:5000"
      - "REPO=jukevox"
      - "KEEP=10"
      - 'TAGS=$(curl -sf "$REGISTRY/v2/$REPO/tags/list" | jq -r ".tags[]" | grep -v "^latest$" | sort -t. -k1,1n -k2,2n -k3,3n)'
      - 'COUNT=$(echo "$TAGS" | wc -l)'
      - 'if [ "$COUNT" -le "$KEEP" ]; then echo "Only $COUNT tags, nothing to prune"; exit 0; fi'
      - 'DELETE=$(echo "$TAGS" | head -n $(($COUNT - $KEEP)))'
      - |
        for TAG in $DELETE; do
          DIGEST=$(curl -sf -H "Accept: application/vnd.docker.distribution.manifest.v2+json" "$REGISTRY/v2/$REPO/manifests/$TAG" -o /dev/null -D - | grep -i docker-content-digest | tr -d "\r" | awk "{print \$2}")
          echo "Deleting $REPO:$TAG (digest: $DIGEST)"
          curl -sf -X DELETE "$REGISTRY/v2/$REPO/manifests/$DIGEST"
        done

  - name: cleanup-vulnerable-image
    image: alpine:3
    commands:
      - apk add --no-cache curl jq
      - VERSION=$(cat .version)
      - "REGISTRY=http://distribution.registry.svc.cluster.local:5000"
      - "REPO=jukevox"
      - 'DIGEST=$(curl -sf -H "Accept: application/vnd.docker.distribution.manifest.v2+json" "$REGISTRY/v2/$REPO/manifests/$VERSION" -o /dev/null -D - | grep -i docker-content-digest | tr -d "\r" | awk "{print \$2}")'
      - 'echo "Deleting $REPO:$VERSION (digest: $DIGEST)"'
      - 'curl -sf -X DELETE "$REGISTRY/v2/$REPO/manifests/$DIGEST"'
      - 'echo "Deleted vulnerable image"'
    when:
      - status: failure

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
