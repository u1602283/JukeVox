steps:
  - name: build
    image: woodpeckerci/plugin-docker-buildx
    settings:
      dockerfile: Dockerfile
      output: type=docker,dest=/woodpecker/src/jukevox.tar

  - name: scan
    image: anchore/grype:latest
    commands:
      - ls -la /woodpecker/src/jukevox.tar
      - grype docker-archive:/woodpecker/src/jukevox.tar --fail-on critical

  # Uncomment when local registry is available
  # - name: push
  #   image: woodpeckerci/plugin-docker-buildx
  #   settings:
  #     dockerfile: Dockerfile
  #     registry: registry.home
  #     repo: registry.home/jukevox
  #     tags:
  #       - ${CI_COMMIT_SHA:0:8}
  #       - latest

when:
  - event: push
    branch: main
    path:
      include:
        - src/**
        - Dockerfile
