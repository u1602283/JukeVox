steps:
  - name: validate
    image: alpine:3
    commands:
      - |
        if [ -z "$TAG" ]; then
          echo "ERROR: TAG variable is required. Pass it as a key-value pair when triggering manually."
          exit 1
        fi
      - |
        if ! echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "ERROR: TAG must be a semver (e.g. 1.0.42), got: $TAG"
          exit 1
        fi
      - echo "Deploying version $TAG"

  - name: update-manifest
    image: alpine/git:latest
    environment:
      SSH_KEY:
        from_secret: woodpecker-deploy-key
    commands:
      - apk add --no-cache sed openssh
      - mkdir -p ~/.ssh
      - echo "$SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan github.com >> ~/.ssh/known_hosts
      - git clone git@github.com:u1602283/REDACTED_GITOPS_REPO.git /tmp/REDACTED_GITOPS_REPO
      - 'sed -i "s|image: REDACTED_REGISTRY/jukevox:.*|image: REDACTED_REGISTRY/jukevox:$TAG|" /tmp/REDACTED_GITOPS_REPO/manifests/jukevox/deployment.yaml'
      - cd /tmp/REDACTED_GITOPS_REPO
      - git config user.name "Woodpecker CI"
      - git config user.email "ci@woodpecker.local"
      - git add .
      - git commit -m "Deploy jukevox:$TAG"
      - git push

when:
  - event: manual
