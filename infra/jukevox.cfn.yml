AWSTemplateFormatVersion: "2010-09-09"
Description: JukeVox EC2 deployment - AL2023 instance with Cloudflare tunnel

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC ID

  InternetGatewayId:
    Type: String
    Description: Existing Internet Gateway ID attached to the VPC

  SubnetCidr:
    Type: String
    Description: CIDR block for the app subnet

  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: Availability zone for the subnet

  EcrRepositoryName:
    Type: String
    Description: ECR repository name (without registry prefix)

  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy

  SecretsArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing Spotify creds and CF tunnel token

  SpotifyRedirectUri:
    Type: String
    Description: "Spotify OAuth redirect URI (e.g. https://jukevox.scottp.dev/api/auth/callback)"

  FrontendUrl:
    Type: String
    Description: "Frontend URL for CORS (e.g. https://jukevox.scottp.dev)"

  HostAuthServerDomain:
    Type: String
    Description: "Domain for host auth cookies (e.g. jukevox.scottp.dev)"

  HostAuthOrigins:
    Type: String
    Description: "Allowed origins for host auth (e.g. https://jukevox.scottp.dev)"

Resources:
  # ──────────────────────────────────────────────
  # Networking
  # ──────────────────────────────────────────────

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref SubnetCidr
      AvailabilityZone: !Ref AvailabilityZone
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: jukevox-subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: jukevox-rt

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGatewayId

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref Subnet
      RouteTableId: !Ref RouteTable

  # ──────────────────────────────────────────────
  # Security Group
  # ──────────────────────────────────────────────

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: App instance - no inbound, all outbound
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: jukevox-app-sg

  # ──────────────────────────────────────────────
  # IAM
  # ──────────────────────────────────────────────

  AppInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: EcrPull
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:BatchCheckLayerAvailability
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${EcrRepositoryName}"
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
        - PolicyName: SecretsRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SecretsArn
      Tags:
        - Key: Name
          Value: jukevox-app-role

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref AppInstanceRole

  # ──────────────────────────────────────────────
  # App Instance
  # ──────────────────────────────────────────────

  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t4g.micro
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-minimal-kernel-default-arm64}}"
      SubnetId: !Ref Subnet
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      IamInstanceProfile: !Ref AppInstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash -xe
            exec > >(tee /var/log/user-data.log) 2>&1

            # ── Install Docker, SSM agent, and tools ──
            dnf install -y docker amazon-ssm-agent aws-cli jq
            systemctl enable --now amazon-ssm-agent
            systemctl enable --now docker

            # ── Install cloudflared ──
            dnf config-manager --add-repo https://pkg.cloudflare.com/cloudflared.repo
            dnf install cloudflared -y

            # ── Prepare directories ──
            mkdir -p /opt/jukevox/data

            # ── Write config (resolved from CloudFormation parameters) ──
            cat > /opt/jukevox/config <<EOF
            AWS_REGION=${AWS::Region}
            AWS_ACCOUNT_ID=${AWS::AccountId}
            ECR_REPOSITORY=${EcrRepositoryName}
            IMAGE_TAG=${ImageTag}
            SECRETS_ARN=${SecretsArn}
            SPOTIFY_REDIRECT_URI=${SpotifyRedirectUri}
            FRONTEND_URL=${FrontendUrl}
            HOSTAUTH_SERVER_DOMAIN=${HostAuthServerDomain}
            HOSTAUTH_ORIGINS=${HostAuthOrigins}
            EOF

            # ── Fetch secrets and write env file ──
            SECRETS_JSON=$(aws secretsmanager get-secret-value \
              --secret-id "${SecretsArn}" \
              --query SecretString --output text \
              --region "${AWS::Region}")

            SPOTIFY_CLIENT_ID=$(echo "${!SECRETS_JSON}" | jq -r '.SPOTIFY__ClientId')
            SPOTIFY_CLIENT_SECRET=$(echo "${!SECRETS_JSON}" | jq -r '.SPOTIFY__ClientSecret')
            CF_TUNNEL_TOKEN=$(echo "${!SECRETS_JSON}" | jq -r '.CF_TUNNEL_TOKEN')

            cat > /opt/jukevox/app.env <<EOF
            SPOTIFY__ClientId=${!SPOTIFY_CLIENT_ID}
            SPOTIFY__ClientSecret=${!SPOTIFY_CLIENT_SECRET}
            SPOTIFY__RedirectUri=${SpotifyRedirectUri}
            ASPNETCORE_URLS=http://+:8080
            DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=true
            FrontendUrl=${FrontendUrl}
            HostAuth__ServerDomain=${HostAuthServerDomain}
            HostAuth__Origins=${HostAuthOrigins}
            EOF

            # ── Pre-create persistent data files ──
            echo 'null' > /opt/jukevox/data/party-state.json
            echo 'null' > /opt/jukevox/data/host-credential.json
            chown 10000:10000 /opt/jukevox/data/party-state.json /opt/jukevox/data/host-credential.json

            # ── ECR login and pull ──
            aws ecr get-login-password --region "${AWS::Region}" | \
              docker login --username AWS --password-stdin "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com"
            docker pull "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryName}:${ImageTag}"

            # ── cloudflared systemd service ──
            cloudflared service install ${!CF_TUNNEL_TOKEN}

            # ── jukevox systemd service ──
            cat > /etc/systemd/system/jukevox.service <<EOF
            [Unit]
            Description=JukeVox Docker Container
            After=docker.service
            Requires=docker.service

            [Service]
            Type=simple
            ExecStartPre=-/usr/bin/docker rm -f jukevox
            ExecStart=/usr/bin/docker run --name jukevox --env-file /opt/jukevox/app.env -v /opt/jukevox/data/party-state.json:/app/party-state.json -v /opt/jukevox/data/host-credential.json:/app/host-credential.json -p 8080:8080 ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EcrRepositoryName}:${ImageTag}
            ExecStop=/usr/bin/docker stop jukevox
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            # ── Deploy script (single-quoted heredoc - no Fn::Sub expansion) ──
            cat > /opt/jukevox/deploy.sh <<'DEPLOYEOF'
            #!/bin/bash
            set -euo pipefail

            # Source config (CloudFormation-resolved values)
            source /opt/jukevox/config

            TAG="$1"
            if [ -z "$TAG" ]; then TAG="$IMAGE_TAG"; fi
            IMAGE="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$TAG"

            echo "=== Deploying JukeVox ($IMAGE) ==="

            # Re-fetch secrets
            SECRETS_JSON=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRETS_ARN" \
              --query SecretString --output text \
              --region "$AWS_REGION")

            SPOTIFY_CLIENT_ID=$(echo "$SECRETS_JSON" | jq -r '.SPOTIFY__ClientId')
            SPOTIFY_CLIENT_SECRET=$(echo "$SECRETS_JSON" | jq -r '.SPOTIFY__ClientSecret')
            CF_TUNNEL_TOKEN=$(echo "$SECRETS_JSON" | jq -r '.CF_TUNNEL_TOKEN')

            # Update env file
            cat > /opt/jukevox/app.env <<ENVEOF
            SPOTIFY__ClientId=$SPOTIFY_CLIENT_ID
            SPOTIFY__ClientSecret=$SPOTIFY_CLIENT_SECRET
            SPOTIFY__RedirectUri=$SPOTIFY_REDIRECT_URI
            ASPNETCORE_URLS=http://+:8080
            DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=true
            FrontendUrl=$FRONTEND_URL
            HostAuth__ServerDomain=$HOSTAUTH_SERVER_DOMAIN
            HostAuth__Origins=$HOSTAUTH_ORIGINS
            ENVEOF

            # Update cloudflared token if changed
            cloudflared service uninstall || true
            cloudflared service install "$CF_TUNNEL_TOKEN"

            # Update jukevox service with new image
            sed -i "s|dkr.ecr.*.amazonaws.com/.*|dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$TAG|" /etc/systemd/system/jukevox.service
            systemctl daemon-reload

            # ECR login and pull
            aws ecr get-login-password --region "$AWS_REGION" | \
              docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
            docker pull "$IMAGE"

            # Restart container
            systemctl restart jukevox

            # Health check
            echo "Waiting for health check..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "=== Health check passed ==="
                docker ps --filter name=jukevox --format "table {{.Image}}\t{{.Status}}"
                exit 0
              fi
              sleep 2
            done

            echo "=== Health check FAILED after 60s ==="
            docker logs jukevox --tail 50
            exit 1
            DEPLOYEOF
            chmod +x /opt/jukevox/deploy.sh

            # ── Start services ──
            systemctl daemon-reload
            systemctl enable --now jukevox

            echo "=== User data complete ==="
      Tags:
        - Key: Name
          Value: jukevox-app

Outputs:
  AppInstanceId:
    Description: App instance ID (for SSM)
    Value: !Ref AppInstance

  SsmConnectCommand:
    Description: SSM command to connect to the app instance
    Value: !Sub "aws ssm start-session --target ${AppInstance}"

  DeployCommand:
    Description: SSM command to deploy a new image
    Value: !Sub "aws ssm send-command --instance-ids ${AppInstance} --document-name AWS-RunShellScript --parameters commands='/opt/jukevox/deploy.sh latest'"
