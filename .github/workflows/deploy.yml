name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        type: string
        default: "latest"
      deploy_infra:
        description: Deploy/update CloudFormation stack
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: jukevox

jobs:
  deploy-infra:
    if: ${{ inputs.deploy_infra }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/jukevox.cfn.yml \
            --stack-name "$STACK_NAME" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              VpcId="${{ vars.VPC_ID }}" \
              InternetGatewayId="${{ vars.IGW_ID }}" \
              PublicSubnetCidr="${{ vars.PUBLIC_SUBNET_CIDR }}" \
              PrivateSubnetCidr="${{ vars.PRIVATE_SUBNET_CIDR }}" \
              AvailabilityZone="${{ vars.AVAILABILITY_ZONE }}" \
              EcrRepositoryName="${{ vars.ECR_REPOSITORY }}" \
              ImageTag="${{ inputs.image_tag }}" \
              SecretsArn="${{ secrets.SECRETS_ARN }}" \
              SpotifyRedirectUri="${{ vars.SPOTIFY_REDIRECT_URI }}" \
              FrontendUrl="${{ vars.FRONTEND_URL }}" \
              HostAuthServerDomain="${{ vars.HOSTAUTH_SERVER_DOMAIN }}" \
              HostAuthOrigins="${{ vars.HOSTAUTH_ORIGINS }}"

  deploy-app:
    needs: deploy-infra
    if: ${{ always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get app instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='AppInstanceId'].OutputValue" \
            --output text)
          echo "id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Instance ID: $INSTANCE_ID"

      - name: Wait for SSM agent
        run: |
          echo "Waiting for SSM agent on ${{ steps.instance.outputs.id }}..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.instance.outputs.id }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online"
              exit 0
            fi
            echo "  Attempt $i/30 - status: $STATUS"
            sleep 10
          done
          echo "SSM agent did not come online after 5 minutes"
          exit 1

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.instance.outputs.id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=['/opt/jukevox/deploy.sh ${{ inputs.image_tag }}']" \
            --timeout-seconds 300 \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for deploy completion
        run: |
          echo "Waiting for command ${{ steps.ssm.outputs.command_id }}..."
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "Status" --output text)
          echo "Command status: $STATUS"

          echo "=== STDOUT ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "StandardOutputContent" --output text

          echo "=== STDERR ==="
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.id }}" \
            --query "StandardErrorContent" --output text

          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi
