<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>JukeVox</title>
  </head>
  <body>
    <div id="root"></div>
    <script>var _ty;document.addEventListener('gesturestart',function(e){e.preventDefault()});document.addEventListener('touchstart',function(e){_ty=e.touches[0].clientY},{passive:true});document.addEventListener('touchmove',function(e){if(e.touches.length>1){e.preventDefault();return}if(e.target.closest('[data-scrollable]'))return;var s=document.scrollingElement;if(e.touches[0].clientY<_ty&&s.scrollTop+s.clientHeight>=s.scrollHeight-1)e.preventDefault()},{passive:false})</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
